<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="sidebar">
  <div class="logo">⬛ Bugiz</div>

  <a href="view-all.html" class="nav-item">View All Tickets</a>

  <a href="projects.html" class="nav-item">Projects</a>

<select 
  id="status-nav" 
  class="status-dropdown"
  onchange="if (this.value) window.location.href = this.value;"
>
  <option value="">Status</option>
  <option value="completed.html">Completed</option>
  <option value="in-progress.html">In Progress</option>
  <option value="overdue.html">Overdue</option>
</select>

  <a href="create-ticket.html" class="nav-item">Create Ticket</a>
  <a href="create-project.html" class="nav-item">Create Project</a>
  <a href="create-user.html" class="nav-item">Add User</a>
</div>

<div class="main">
  <div class="topbar">
    <div class="search">
      <input placeholder="Search">
      <button>Search</button>
    </div>
    <div class="profile">
      <div class="avatar"></div>
      <div>UserName<br>
        <a href="login.html">Log out</a>
      </div>
    </div>
  </div>

<div class="content">
  <h1>In Progress Tickets</h1>

  <div class="table-header">
    <div>Summary</div>
    <div>Reporter</div>
    <div>Developer</div>
    <div>Status</div>
    <div>Edit</div>
    <div>View</div>
  </div>

  <div class="ticket-row">
    <div>Working on bug</div>
    <div><div class="small-avatar"></div></div>
    <div><div class="small-avatar"></div></div>
    <div>In Progress</div>
    <div><span class="btn btn-blue">Edit</span></div>
    <div><span class="btn btn-blue">View</span></div>
  </div>
</div>

<footer></footer>
</div>
<script src="script.js"></script>
</body>
</html>

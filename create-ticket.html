<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<!-- NAV -->
<div class="sidebar">
  <div class="logo">⬛ Bugiz</div>

  <a href="view-all.html" class="nav-item">View All Tickets</a>

  <a href="projects.html" class="nav-item">Projects</a>



<select 
  id="status-nav" 
  class="status-dropdown"
  onchange="if (this.value) window.location.href = this.value;"
>
  <option value="">Status</option>
  <option value="completed.html">Completed</option>
  <option value="in-progress.html">In Progress</option>
  <option value="overdue.html">Overdue</option>
</select>

  <a href="create-ticket.html" class="nav-item"><strong>Create Ticket</strong></a>
  <a href="create-project.html" class="nav-item">Create Project</a>
  <a href="create-user.html" class="nav-item">Add User</a>
</div>

<div class="main">
  <div class="topbar">
    <div class="search">
      <input placeholder="Search">
      <button>Search</button>
    </div>
    <div class="profile">
      <div class="avatar"></div>
      <div>UserName<br>
        <a href="login.html">Log out</a>
      </div>
    </div>
  </div>


<div class="content">
  <h1>Bug Reporting Form</h1>

  <input placeholder="Brief summary of the issue">
  <textarea placeholder="Detailed description"></textarea>

  <div class="form-row">
    <input placeholder="Who identified the issue">
    <input type="date">
  </div>

  <div class="form-row">
    <select><option>Project 1</option></select>
    <select><option>Team member 1</option></select>
  </div>

  <h3>Status</h3>
  <div class="status-buttons">
    <div class="resolved">Resolved</div>
    <div class="open">Open</div>
    <div class="overdue">Overdue</div>
  </div>

  <div class="btn-row" style="text-align:right">
    <button class="btn">Cancel</button>
    <button class="btn btn-blue">Submit form</button>
  </div>
</div>

<footer></footer>
</div>
</body>
</html>
